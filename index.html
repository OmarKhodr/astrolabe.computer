<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrolabe Computer</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Moving star layer */
    .stars {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url('img/twins.svg');
      background-size: 420px 420px;
      opacity: 0.18;
      animation: drift 120s linear infinite;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(420px, 420px); }
    }

    /* Blue radial glow */
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(21, 94, 199, 0.28) 0%, transparent 75%);
      pointer-events: none;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      z-index: 10;
    }

    .logo-wrap img {
      max-width: min(320px, 60vw);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow"></div>

  <div class="logo-wrap">
    <img src="img/logo.png" alt="Astrolabe Computer">
  </div>
</body>
</html>
