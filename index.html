<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrolabe Computer</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Moving star layer */
    .stars {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url('img/twins.svg');
      background-size: 420px 420px;
      opacity: 0.18;
      animation: drift 120s linear infinite;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(420px, 420px); }
    }

    /* Corner glows — plus-lighter matches the SVG design exactly */
    .glow-tl, .glow-br {
      position: fixed;
      width: 65vmax;
      height: 50vmax;
      border-radius: 50%;
      background: #155EC7;
      mix-blend-mode: plus-lighter;
      filter: blur(200px);
      pointer-events: none;
      z-index: 1;
    }
    .glow-tl { top: -30vmax;    left: -18vmax; }
    .glow-br { bottom: -30vmax; right: -18vmax; }

    /* Dark diagonal band — mirrors the rotated dark ellipse in the SVG */
    .dark-band {
      position: fixed;
      width: 250vw;
      height: 40vh;
      left: -75vw;
      bottom: 18vh;
      background: rgba(21, 21, 21, 0.78);
      filter: blur(80px);
      transform: rotate(-37deg);
      pointer-events: none;
      z-index: 2;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      z-index: 10;
    }

    .logo-wrap img {
      max-width: min(320px, 60vw);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="dark-band"></div>

  <div class="logo-wrap">
    <img src="img/logo.png" alt="Astrolabe Computer">
  </div>
</body>
</html>
