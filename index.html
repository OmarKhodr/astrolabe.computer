<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astrolabe Computer</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Moving star layer */
    .stars {
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background-image: url('img/twins.svg');
      background-size: 420px 420px;
      opacity: 0.18;
      animation: drift 120s linear infinite;
    }

    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(420px, 420px); }
    }

    /* Corner glows — radial gradient replaces blur(200px), same look, zero GPU cost */
    .glow-tl, .glow-br {
      position: fixed;
      width: 100vmax;
      height: 80vmax;
      background: radial-gradient(ellipse at center, rgba(21, 94, 199, 0.9) 0%, transparent 65%);
      mix-blend-mode: plus-lighter;
      pointer-events: none;
      z-index: 1;
    }
    .glow-tl { top: -55vmax;    left: -35vmax; }
    .glow-br { bottom: -55vmax; right: -35vmax; }

    /* Dark diagonal band — gradient replaces blur(80px) */
    .dark-band {
      position: fixed;
      width: 250vw;
      height: 50vh;
      left: -75vw;
      bottom: 18vh;
      background: linear-gradient(to bottom,
        transparent,
        rgba(21, 21, 21, 0.78) 35%,
        rgba(21, 21, 21, 0.78) 65%,
        transparent);
      transform: rotate(-37deg);
      pointer-events: none;
      z-index: 2;
    }

    /* Logo */
    .logo-wrap {
      position: relative;
      z-index: 10;
    }

    .logo-wrap img {
      max-width: min(320px, 60vw);
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="glow-tl"></div>
  <div class="glow-br"></div>
  <div class="dark-band"></div>

  <div class="logo-wrap">
    <img src="img/logo.svg" alt="Astrolabe Computer">
  </div>
</body>
</html>
